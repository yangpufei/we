<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的初次相遇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}

#bgVideo{
  position: fixed;top:0;left:0;width:100vw;height:100vh;
  object-fit:cover;z-index:-1;pointer-events:none;
  opacity:0;
  transition: opacity 0.8s ease;
}

#loadingTip{
  position: fixed;top:0;left:0;width:100vw;height:100vh;
  background:#fceff4;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:999;
  color:#d15a7c;
}
#loadingTip .spinner{
  width:40px;height:40px;border:4px solid #f06c9b;border-top-color:transparent;
  border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.tip-box{
  background:rgba(255,255,255,0.95);
  padding:16px;border-radius:10px;margin-bottom:20px;
  color:#d15a7c;font-size:14px;line-height:1.6;
}

.audio-tip{
  color:#888;font-size:13px;margin-top:8px;
}

body{
  min-height:100vh;display:flex;justify-content:center;
  align-items:center;padding:20px;overflow:hidden;
}
.box{background:rgba(255,255,255,0.9);padding:40px;border-radius:16px;width:100%;max-width:520px;text-align:center;backdrop-filter:blur(6px)}
h2{margin-bottom:20px;color:#d15a7c}
p{margin-bottom:15px;color:#555}
input{width:85%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:16px;font-size:16px}
.btn-pink{padding:12px 26px;background:#f06c9b;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px}
.btn-blue{padding:12px 26px;background:#6bb3ef;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px}
.download-btn{background:#76c479;color:white;padding:12px 26px;border-radius:10px;text-decoration:none;display:inline-block}
.player{margin:22px 0;display:none;}
.download{display:none;margin-top:20px}
.tip{color:#e65c7c;margin-top:10px}
</style>
</head>
<body>

<div id="loadingTip">
  <div class="spinner"></div>
  <p>正在加载背景资源...</p>
  <p style="font-size:13px;color:#888;margin-top:8px;">老登建议：在电脑浏览器打开，体验更流畅</p>
</div>

<video id="bgVideo" autoplay preload="auto"></video>

<div class="box" id="step1">
  <h2>解锁我们初见的声音</h2>
  <div class="tip-box">
    💡 温馨提示：建议在电脑浏览器打开，资源加载更稳定哦
  </div>
  <p>请回答问题，收听我们第一次通话的录音</p>
  <p>问题1：你的名字是？</p>
  <input type="text" id="ans1" placeholder="请输入答案">
  <br>
  <button class="btn-pink" onclick="check1()">验证并收听</button>
  <div class="tip" id="msg1"></div>
</div>

<div class="box" id="step2" style="display:none;">
  <h2>✅ 欢迎回到初见时刻</h2>
  <div class="player" id="player">
    <audio id="recordAudio" controls controlsList="nodownload">
    <p class="audio-tip" id="audioTip">录音加载中...</p>
  </div>

  <h3>再答对一题，即可保存这份回忆</h3>
  <p>问题2：我们初遇在哪里？</p>
  <input type="text" id="ans2" placeholder="请输入答案">
  <br>
  <button class="btn-blue" onclick="check2()">验证并下载</button>
  <div class="tip" id="msg2"></div>

  <div class="download" id="downArea">
    <h3>💌 回忆已为你解锁</h3>
    <a id="downloadLink" download="我们的初次通话录音" class="download-btn">点击下载录音</a>
  </div>
</div>

<script>
// ======================
// 🔒 加密后的答案（这里替换成你自己的SHA256）
// ======================
const secureAnswer1 = "79d3bf901d28c96cb3ea5bd3d3448d6135c398f909fc720aaa34863a1c520ebf";
const secureAnswer2 = "这里放第二题答案的SHA256";
const realAudioUrl = "20240427_222755郭同学.m4a"; 

// 5段背景视频切片
const videoSegments = [
  "bg1.mp4",
  "bg2.mp4",
  "bg3.mp4",
  "bg4.mp4",
  "bg5.mp4"
];
let currentVideoIndex = 0;
const bgVideo = document.getElementById('bgVideo');
const loadingTip = document.getElementById('loadingTip');
const recordAudio = document.getElementById('recordAudio');
const audioTip = document.getElementById('audioTip');

// 视频加载完成后隐藏加载提示
bgVideo.addEventListener('canplaythrough', () => {
  loadingTip.style.display = 'none';
  bgVideo.style.opacity = 1;
});

// 视频加载失败降级
bgVideo.addEventListener('error', () => {
  loadingTip.innerHTML = `
    <p style="color:#e65c7c;">视频加载失败了~</p>
    <p style="font-size:13px;color:#888;">建议在电脑浏览器打开试试</p>
  `;
  setTimeout(()=>{
    loadingTip.style.display = 'none';
    bgVideo.style.opacity = 1;
  }, 3000);
});

// 顺序循环播放视频
function playNextVideo() {
  currentVideoIndex = currentVideoIndex >= videoSegments.length ? 0 : currentVideoIndex;
  bgVideo.src = videoSegments[currentVideoIndex];
  bgVideo.load();
  bgVideo.play().catch(()=>{});
  currentVideoIndex++;
}
bgVideo.addEventListener('ended', playNextVideo);
playNextVideo();

// 点击页面解锁视频声音
document.body.addEventListener('click', ()=>{
  bgVideo.muted = false;
  bgVideo.play().catch(()=>{});
},{once:true});

// 录音和背景视频互斥
recordAudio.addEventListener('play', () => bgVideo.pause());
recordAudio.addEventListener('pause', () => bgVideo.play());
recordAudio.addEventListener('ended', () => bgVideo.play());

// 录音加载状态监听
recordAudio.addEventListener('loadedmetadata', () => {
  audioTip.innerText = "录音加载完成，可以播放啦~";
  setTimeout(() => audioTip.style.display = 'none', 1500);
});
recordAudio.addEventListener('error', () => {
  audioTip.innerText = "录音加载失败，请检查文件路径是否正确";
  audioTip.style.color = "#e65c7c";
});

// ======================
// SHA256加密工具函数
// ======================
async function sha256(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str.trim());
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ======================
// 验证逻辑
// ======================
async function check1(){
  const input = document.getElementById("ans1").value;
  const inputHash = await sha256(input);
  if(inputHash === secureAnswer1){
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
    // 答对后再加载录音，并且强制加载
    recordAudio.src = realAudioUrl;
    recordAudio.load();
    document.getElementById("player").style.display = "block";
  }else{
    document.getElementById("msg1").innerText="❌ 答案不对哦，再想想～";
  }
}

async function check2(){
  const input = document.getElementById("ans2").value;
  const inputHash = await sha256(input);
  if(inputHash === secureAnswer2){
    document.getElementById("downArea").style.display="block";
    document.getElementById("downloadLink").href = realAudioUrl;
  }else{
    document.getElementById("msg2").innerText="❌ 再试一次吧";
  }
}
</script>
</body>
</html>
