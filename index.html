<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>验证后收听录音</title>
    <style>
        body{text-align:center; margin-top:100px; font-size:18px;}
        input{padding:8px 12px; font-size:16px; width:250px; margin:10px;}
        button{padding:8px 20px; font-size:16px;}
        #audioArea, #downloadArea{display:none; margin-top:30px;}
    </style>
</head>
<body>

<h2>请回答问题，才能收听录音</h2>
<input type="text" id="answer1" placeholder="输入问题1答案">
<br>
<button onclick="check1()">验证并收听</button>

<div id="audioArea">
    <h3>收听成功</h3>
    <audio controls id="myAudio" style="width:80%;max-width:400px;">
        <source src="20240427_222755_[通话录音].m4a">
    </audio>

    <h3>请再回答一个问题，才能下载</h3>
    <input type="text" id="answer2" placeholder="输入问题2答案">
    <br>
    <button onclick="check2()">验证并下载</button>
</div>

<div id="downloadArea">
    <h3>验证成功</h3>
    <a id="downloadLink" href="20240427_222755_[通话录音].m4a" download>点击下载录音</a>
</div>

<script>
// ======================
// 你可以自己改答案
// ======================
const rightAnswer1 = "abc123";  // 第一个问题答案
const rightAnswer2 = "download666"; // 第二个问题答案

function check1(){
    var v = document.getElementById("answer1").value;
    if(v == rightAnswer1){
        document.getElementById("audioArea").style.display = "block";
    }else{
        alert("答案不正确");
    }
}

function check2(){
    var v = document.getElementById("answer2").value;
    if(v == rightAnswer2){
        document.getElementById("downloadArea").style.display = "block";
    }else{
        alert("答案不正确");
    }
}
</script>

</body>
</html>
