<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的初次相遇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}
#bgVideo{
  position: fixed;top:0;left:0;width:100vw;height:100vh;
  object-fit:cover;z-index:-1;pointer-events:none;
}
body{
  min-height:100vh;display:flex;justify-content:center;
  align-items:center;padding:20px;overflow:hidden;
}
.box{background:rgba(255,255,255,0.9);padding:40px;border-radius:16px;width:100%;max-width:520px;text-align:center;backdrop-filter:blur(6px)}
h2{margin-bottom:20px;color:#d15a7c}
p{margin-bottom:15px;color:#555}
input{width:85%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:16px;font-size:16px}
.btn-pink{padding:12px 26px;background:#f06c9b;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px}
.btn-blue{padding:12px 26px;background:#6bb3ef;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px}
.download-btn{background:#76c479;color:white;padding:12px 26px;border-radius:10px;text-decoration:none;display:inline-block}
.player{margin:22px 0;display:none;}
.download{display:none;margin-top:20px}
.tip{color:#e65c7c;margin-top:10px}
</style>
</head>
<body>

<!-- 已删除 muted ，视频恢复原声 -->
<video id="bgVideo" autoplay></video>

<div class="box" id="step1">
  <h2>解锁我们初见的声音</h2>
  <p>请回答问题，收听我们第一次通话的录音</p>
  <p>问题1：我的生日是？</p>
  <input type="text" id="ans1" placeholder="请输入答案">
  <br>
  <button class="btn-pink" onclick="check1()">验证并收听</button>
  <div class="tip" id="msg1"></div>
</div>

<div class="box" id="step2" style="display:none;">
  <h2>✅ 欢迎回到初见时刻</h2>
  
  <div class="player" id="player">
    <audio id="recordAudio" controls controlsList="nodownload">
  </div>

  <h3>再答对一题，即可保存这份回忆</h3>
  <p>问题2：我的手机号后四位？</p>
  <input type="text" id="ans2" placeholder="请输入答案">
  <br>
  <button class="btn-blue" onclick="check2()">验证并下载</button>
  <div class="tip" id="msg2"></div>

  <div class="download" id="downArea">
    <h3>💌 回忆已为你解锁</h3>
    <a id="downloadLink" download="我们的初次通话录音" class="download-btn">点击下载录音</a>
  </div>
</div>

<script>
// 🔒 加密答案
const secureAnswer1 = "44aee34706c544c58822c77006b12b2faadf2c4d4592e0d513166b29371f10f7";
const secureAnswer2 = "03ac674216f7e2c8f390ee5abe05ba75a11a3136812690132184b65a02211618";
const realAudioUrl = "20240427_222755郭同学.m4a";

// 🎬 5段切片视频列表
const videoSegments = [
  "bg1.mp4",
  "bg2.mp4",
  "bg3.mp4",
  "bg4.mp4",
  "bg5.mp4"
];
let currentVideoIndex = 0;
const bgVideo = document.getElementById('bgVideo');

// 切换下一段视频、循环播放
function playNextVideo() {
  if (currentVideoIndex >= videoSegments.length) {
    currentVideoIndex = 0;
  }
  bgVideo.src = videoSegments[currentVideoIndex];
  bgVideo.play();
  currentVideoIndex++;
}
bgVideo.addEventListener('ended', playNextVideo);
// 初始化播放
playNextVideo();

// 🔊 录音播放 = 暂停背景视频；录音暂停/结束 = 恢复视频
const recordAudio = document.getElementById('recordAudio');
recordAudio.addEventListener('play', () => bgVideo.pause());
recordAudio.addEventListener('pause', () => bgVideo.play());
recordAudio.addEventListener('ended', () => bgVideo.play());

// SHA256加密校验
async function sha256(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function check1() {
  let val = document.getElementById("ans1").value.trim();
  let hash = await sha256(val);
  if (hash === secureAnswer1) {
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
    recordAudio.src = realAudioUrl;
    document.getElementById("player").style.display = "block";
  } else {
    document.getElementById("msg1").innerText = "❌ 答案不对哦，再想想～";
  }
}

async function check2() {
  let val = document.getElementById("ans2").value.trim();
  let hash = await sha256(val);
  if (hash === secureAnswer2) {
    document.getElementById("downArea").style.display = "block";
    document.getElementById("downloadLink").href = realAudioUrl;
  } else {
    document.getElementById("msg2").innerText = "❌ 再试一次吧";
  }
}
</script>
</body>
</html>
